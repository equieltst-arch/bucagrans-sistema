<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bucagrans Construtora</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:‘Segoe UI’,Arial,sans-serif;
background:#06090f;
color:white;
min-height:100vh;
overflow:hidden;
}

/* Fundo escuro com grade e efeito de luz */
.bg{
position:fixed;inset:0;
background:
radial-gradient(ellipse 70% 60% at 50% 50%, rgba(26,58,107,.45) 0%, transparent 65%),
#06090f;
z-index:0;
}
.grid{
position:fixed;inset:0;
background-image:
linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
background-size:50px 50px;
z-index:1;
}

/* Conteúdo */
.wrap{
position:relative;z-index:10;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:32px;
padding:40px 24px;
}

/* Logo */
.logo-wrap{
opacity:0;
animation:fadeUp .7s ease forwards;
animation-delay:.2s;
}
.logo-wrap img{
height:120px;
width:auto;
filter:brightness(0) invert(1);
}

/* Badge pulsando */
.badge{
display:inline-flex;
align-items:center;
gap:10px;
background:rgba(139,0,0,.18);
border:1px solid rgba(192,57,43,.4);
border-radius:30px;
padding:9px 22px;
opacity:0;
animation:fadeUp .7s ease forwards;
animation-delay:.45s;
}
.badge-dot{
width:8px;height:8px;
border-radius:50%;
background:#c0392b;
flex-shrink:0;
animation:pulse 1.2s infinite alternate;
}
.badge-txt{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:rgba(255,255,255,.85);
font-weight:600;
}

@keyframes pulse{
from{opacity:1;box-shadow:0 0 0 0 rgba(192,57,43,.5)}
to{opacity:.6;box-shadow:0 0 0 7px rgba(192,57,43,0)}
}

/* Botão */
.btn-enter{
background:linear-gradient(135deg,#8b0000,#c0392b);
border:none;
color:white;
font-size:13px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
padding:14px 48px;
border-radius:6px;
cursor:pointer;
box-shadow:0 4px 20px rgba(139,0,0,.4);
transition:transform .15s, box-shadow .15s;
opacity:0;
animation:fadeUp .7s ease forwards;
animation-delay:.65s;
}
.btn-enter:hover{
transform:translateY(-2px);
box-shadow:0 8px 28px rgba(139,0,0,.55);
}
.btn-enter:active{transform:translateY(0);}

/* Animações */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
.fade-out{animation:fadeOut .45s ease forwards !important;}
@keyframes fadeOut{to{opacity:0;transform:scale(.97);}}
</style>

</head>
<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="wrap" id="main">

  <div class="logo-wrap">
    <img src="logo bucagrans.jpg" alt="Bucagrans">
  </div>

  <div class="badge">
    <div class="badge-dot"></div>
    <span class="badge-txt">Obra em andamento · PCH Lebon Regis</span>
  </div>

<button class="btn-enter" onclick="entrar()">Acessar Sistema</button>

</div>

<script>
function entrar(){
  document.getElementById("main").classList.add("fade-out");
  setTimeout(function(){ window.location.href="sistema.html"; }, 450);
}
</script>

</body>
</html>
