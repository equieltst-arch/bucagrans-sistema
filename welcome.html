<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucagrans - Bem-vindo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;800;900&family=Barlow:wght@300;400&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#060a14;font-family:'Barlow Condensed',sans-serif}
  .bg-g{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 90% 70% at 50% 45%,#0b1a3d 0%,#04060e 75%)}
  .bg-grid{position:fixed;inset:0;z-index:1;background-image:linear-gradient(rgba(42,74,130,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(42,74,130,.07) 1px,transparent 1px);background-size:55px 55px}
  .bg-glow{position:fixed;inset:0;z-index:2;background:radial-gradient(ellipse 55% 50% at 50% 46%,rgba(26,58,130,.2) 0%,transparent 68%);animation:gPulse 5s ease-in-out infinite alternate}
  @keyframes gPulse{from{opacity:.5;transform:scale(1)}to{opacity:1;transform:scale(1.12)}}
  .scan{position:fixed;inset:0;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.045) 3px,rgba(0,0,0,.045) 4px)}
  .corner{position:fixed;width:50px;height:50px;opacity:.22;z-index:10}
  .corner::before,.corner::after{content:'';position:absolute;background:#3a6abf}
  .corner::before{width:2px;height:36px}
  .corner::after{width:36px;height:2px}
  .c-tl{top:18px;left:18px}.c-tr{top:18px;right:18px;transform:scaleX(-1)}
  .c-bl{bottom:18px;left:18px;transform:scaleY(-1)}.c-br{bottom:18px;right:18px;transform:scale(-1)}
  .scene{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .logo-stage{position:relative;width:340px;height:280px;display:flex;align-items:center;justify-content:center}
  .logo-bg-glow{position:absolute;width:300px;height:220px;border-radius:50%;background:radial-gradient(ellipse,rgba(30,60,140,.4) 0%,transparent 70%);opacity:0;animation:glowIn 1s ease forwards 2.2s}
  @keyframes glowIn{to{opacity:1}}
  /* fragment = copy of logo with clip-path */
  .frag{position:absolute;left:0;top:0;width:320px;height:270px;will-change:transform,opacity;overflow:hidden}
  .frag img{width:320px;height:270px;object-fit:contain;display:block;pointer-events:none}
  /* text */
  .tblock{text-align:center;margin-top:4px;opacity:0;transform:translateY(22px)}
  .tblock.show{animation:riseIn .75s ease forwards}
  @keyframes riseIn{to{opacity:1;transform:translateY(0)}}
  .cname{font-size:clamp(32px,5.8vw,58px);font-weight:900;letter-spacing:5px;color:#edf1fb;text-shadow:0 0 45px rgba(42,74,130,.9),0 2px 0 rgba(0,0,0,.55);text-transform:uppercase;line-height:1}
  .lsep{width:230px;height:2px;background:linear-gradient(90deg,transparent,#3a6abf 30%,#8b0000 70%,transparent);margin:10px auto;opacity:0}
  .lsep.show{animation:fadeIn .5s ease forwards .15s}
  @keyframes fadeIn{to{opacity:1}}
  .sub{font-family:'Barlow',sans-serif;font-size:clamp(10px,1.7vw,12px);font-weight:300;letter-spacing:4px;color:rgba(150,185,240,.55);text-transform:uppercase;margin-bottom:4px}
  .badge{display:inline-block;border:1px solid rgba(58,106,191,.3);border-radius:3px;padding:5px 18px;font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(150,185,240,.7);text-transform:uppercase;margin-top:8px;background:rgba(20,40,85,.5)}
  /* CTA */
  .cta{margin-top:40px;opacity:0;transform:translateY(16px)}
  .cta.show{animation:riseSpring .85s cubic-bezier(.34,1.56,.64,1) forwards}
  @keyframes riseSpring{to{opacity:1;transform:translateY(0)}}
  .btn{position:relative;background:transparent;border:none;cursor:pointer;padding:0;outline:none}
  .btn-in{position:relative;display:inline-flex;align-items:center;gap:14px;background:linear-gradient(135deg,#0f2048 0%,#1c3a6a 100%);border:1.5px solid rgba(58,106,191,.48);border-radius:4px;padding:17px 46px;color:#edf1fb;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:4px;text-transform:uppercase;overflow:hidden;transition:all .3s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}
  .btn-in::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
  .btn:hover .btn-in{border-color:rgba(58,106,191,.92);box-shadow:0 0 36px rgba(26,60,150,.65),0 0 72px rgba(26,60,150,.22),inset 0 1px 0 rgba(255,255,255,.12);transform:translateY(-2px)}
  .btn:hover .btn-in::after{left:130%;transition:left .5s ease}
  .btn:active .btn-in{transform:translateY(0)}
  .arr{width:20px;height:20px;fill:none;stroke:rgba(210,225,255,.85);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s,stroke .3s}
  .btn:hover .arr{stroke:white;transform:translateX(5px)}
  .pulse{position:absolute;inset:-7px;border-radius:7px;border:1px solid rgba(58,106,191,.38);animation:ringP 2.8s ease-in-out infinite}
  @keyframes ringP{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.06);opacity:0}}
  .version{position:fixed;bottom:18px;right:22px;font-size:9px;letter-spacing:2px;color:rgba(70,110,190,.28);text-transform:uppercase;z-index:30}
  .wipe{position:fixed;inset:0;z-index:9999;background:#060a14;transform:scaleX(0);transform-origin:left;display:none}
  .wipe.go{display:block;animation:wipeA .5s cubic-bezier(.87,0,.13,1) forwards}
  @keyframes wipeA{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .pt{position:absolute;border-radius:50%;pointer-events:none;animation:ptFly var(--d) ease forwards var(--delay);opacity:0}
  @keyframes ptFly{0%{opacity:0;transform:translate(0,0)scale(1)}20%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty))scale(0)}}
  @keyframes shimFrag{0%,100%{filter:brightness(1) drop-shadow(0 0 2px rgba(58,106,191,.3))}50%{filter:brightness(1.18) drop-shadow(0 0 18px rgba(58,106,191,.8))}}
</style>
</head>
<body>
<div class="bg-g"></div><div class="bg-grid"></div><div class="bg-glow"></div><div class="scan"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div><div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="version">PCH Lebon Regis · v2026</div>
<div class="scene">
  <div class="logo-stage">
    <div class="logo-bg-glow"></div>
    <div id="fragWrap" style="position:absolute;left:10px;top:5px;width:320px;height:270px;"></div>
    <div id="ptField" style="position:absolute;inset:-80px;pointer-events:none;"></div>
  </div>
  <div class="tblock" id="tblock">
    <p class="sub">Sistema de Gestão de Efetivo</p>
    <div class="lsep" id="lsep"></div>
    <p class="badge">PCH Lebon Regis</p>
  </div>
  <div class="cta" id="cta">
    <button class="btn" onclick="enterSystem()">
      <div class="pulse"></div>
      <div class="btn-in">
        Acessar Sistema
        <svg class="arr" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </div>
    </button>
  </div>
</div>
<div class="wipe" id="wipe"></div>
<script>
var LOGO_SRC = "logo.jpg";

// 12 fragments: each is a clipped window of the logo
// clip-path uses polygon in % of the 320x270 container
var FRAGS = [
// top-left area
{clip:‘polygon(0% 0%, 52% 0%, 42% 52%, 0% 40%)’,           ox:-170, oy:-140, or:-38, delay:0   },
// top-right area
{clip:‘polygon(52% 0%, 100% 0%, 100% 35%, 58% 50%)’,        ox: 175, oy:-120, or: 32, delay:.07 },
// center-top
{clip:‘polygon(28% 0%, 72% 0%, 68% 30%, 32% 30%)’,          ox:  10, oy:-200, or:-8,  delay:.13 },
// left-middle
{clip:‘polygon(0% 40%, 42% 52%, 35% 80%, 0% 72%)’,          ox:-210, oy:  60, or: 48, delay:.05 },
// right-middle
{clip:‘polygon(58% 50%, 100% 35%, 100% 72%, 65% 80%)’,      ox: 205, oy:  70, or:-44, delay:.10 },
// center core
{clip:‘polygon(32% 30%, 68% 30%, 72% 72%, 28% 72%)’,        ox:  20, oy:-190, or: -6, delay:.18 },
// bottom-left
{clip:‘polygon(0% 72%, 35% 80%, 25% 100%, 0% 100%)’,        ox:-185, oy: 170, or: 55, delay:.22 },
// bottom-center
{clip:‘polygon(25% 80%, 75% 80%, 65% 100%, 35% 100%)’,      ox:   5, oy: 200, or:-12, delay:.20 },
// bottom-right
{clip:‘polygon(65% 80%, 100% 72%, 100% 100%, 72% 100%)’,    ox: 180, oy: 175, or:-50, delay:.15 },
// left-wing
{clip:‘polygon(0% 0%, 28% 0%, 32% 30%, 42% 52%, 0% 40%)’,  ox:-195, oy: -20, or: 35, delay:.08 },
// right-wing
{clip:‘polygon(72% 0%, 100% 0%, 100% 35%, 58% 50%, 68% 30%)’, ox:190, oy:-15, or:-32, delay:.11},
// center-lower
{clip:‘polygon(28% 72%, 72% 72%, 75% 80%, 25% 80%)’,        ox:  30, oy: 185, or: 10, delay:.25 },
];

var wrap = document.getElementById(‘fragWrap’);
var fragEls = [];

FRAGS.forEach(function(f) {
var div = document.createElement(‘div’);
div.className = ‘frag’;
div.style.cssText = ‘position:absolute;left:0;top:0;width:320px;height:270px;clip-path:’+f.clip+’;overflow:hidden;will-change:transform,opacity;transform:translate(’+f.ox+‘px,’+f.oy+‘px) rotate(’+f.or+‘deg) scale(.6);opacity:0;’;
var img = document.createElement(‘img’);
img.src = LOGO_SRC;
img.style.cssText = ‘width:320px;height:270px;object-fit:contain;display:block;pointer-events:none;’;
div.appendChild(img);
wrap.appendChild(div);
fragEls.push({el:div, f:f});
});

function spawnParticles() {
var field = document.getElementById(‘ptField’);
var colors = [’#3a6abf’,’#5a8fd1’,’#8b0000’,’#c0392b’,‘rgba(255,255,255,.8)’];
for (var i = 0; i < 50; i++) {
var p = document.createElement(‘div’);
p.className = ‘pt’;
var angle = Math.random()*360;
var dist = 55+Math.random()*210;
p.style.cssText = ‘left:’+(43+Math.random()*14)+’%;top:’+(36+Math.random()*28)+’%;width:’+(1+Math.random()*3)+‘px;height:’+(1+Math.random()*3)+‘px;background:’+colors[Math.floor(Math.random()*colors.length)]+’;–tx:’+Math.cos(angle*Math.PI/180)*dist+‘px;–ty:’+Math.sin(angle*Math.PI/180)*dist+‘px;–d:’+(1.3+Math.random()*1.3)+‘s;–delay:’+(Math.random()*.9)+‘s;’;
field.appendChild(p);
}
}

function startAnimation() {
spawnParticles();
fragEls.forEach(function(item) {
setTimeout(function() {
item.el.style.transition = ‘transform 1.15s cubic-bezier(.22,1,.36,1), opacity 1.15s cubic-bezier(.22,1,.36,1)’;
item.el.style.transform = ‘translate(0,0) rotate(0deg) scale(1)’;
item.el.style.opacity = ‘1’;
}, Math.round(item.f.delay*1000)+350);
});
setTimeout(function() {
fragEls.forEach(function(item) {
item.el.style.transition = ‘none’;
item.el.style.animation = ‘shimFrag 3.5s ease-in-out infinite’;
});
document.getElementById(‘tblock’).classList.add(‘show’);
document.getElementById(‘lsep’).classList.add(‘show’);
}, 2000);
setTimeout(function() {
document.getElementById(‘cta’).classList.add(‘show’);
}, 2600);
}

function enterSystem() {
var w = document.getElementById(‘wipe’);
w.classList.add(‘go’);
setTimeout(function(){ window.location.href=‘index.html’; }, 480);
}

window.addEventListener(‘load’, function(){ setTimeout(startAnimation, 380); });
</script>

</body>
</html>
